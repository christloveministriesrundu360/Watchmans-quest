<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixar Pro Racer: Offline Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.160.0/three.min.js"></script>
    <style>
        :root { --primary: #ff4757; --dark: #1e272e; --text: #f1f2f6; --accent: #ffa502; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; user-select: none; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(30,39,46,0.9) 0%, rgba(0,0,0,0.95) 100%);
            color: var(--text); z-index: 100; backdrop-filter: blur(5px);
        }
        .hidden { display: none !important; }
        
        .menu-box {
            background: rgba(30,39,46,0.8); padding: 50px; border-radius: 15px;
            border: 2px solid var(--primary); text-align: center; width: 500px;
        }
        
        h1 { font-size: 3rem; margin: 0; text-transform: uppercase; text-shadow: 3px 3px 0px var(--primary); }
        
        button {
            background: var(--dark); border: 2px solid var(--text); color: var(--text);
            padding: 15px 20px; font-size: 1.2rem; font-weight: 800; border-radius: 8px;
            cursor: pointer; margin: 10px; width: 80%; text-transform: uppercase; transition: 0.2s;
        }
        button:hover { background: var(--primary); transform: scale(1.05); }
        
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 50; display: flex; flex-direction: column; justify-content: space-between;
        }
        .hud-panel { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; border-left: 4px solid var(--primary); margin: 20px; color: white; }
        .speedometer { background: rgba(0,0,0,0.8); width: 120px; height: 120px; border-radius: 50%; border: 4px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 20px; }
        #damage-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: red; opacity: 0; pointer-events: none; z-index: 90; }
    </style>
</head>
<body>

    <div id="damage-flash"></div>

    <div id="hud" class="hidden">
        <div style="display:flex; justify-content: space-between;">
            <div class="hud-panel">
                <h3 id="zone-display" style="margin:0">VALLEY</h3>
                <p style="margin:5px 0">Dist: <span id="dist-display">0</span>m</p>
            </div>
            <div class="hud-panel" style="text-align:right">
                <h3 style="margin:0; color:red">WANTED</h3>
                <div id="wanted-level">☆☆☆☆☆</div>
                <p style="margin:5px 0">HP: <span id="health-display">100</span>%</p>
            </div>
        </div>
        <div style="display:flex; justify-content:center">
            <div class="speedometer">
                <div style="font-size:2rem; font-weight:900" id="speed-display">0</div>
                <div style="font-size:0.7rem">KM/H</div>
            </div>
        </div>
    </div>

    <div id="main-menu" class="overlay">
        <div class="menu-box">
            <h1>PIXAR RACER</h1>
            <button onclick="ui.showScreen('car-select')">GARAGE</button>
            <button onclick="game.start()">START GAME</button>
        </div>
    </div>

    <div id="car-select" class="overlay hidden">
        <div class="menu-box">
            <h2>GARAGE</h2>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                <button onclick="game.setCar('Ferrari')">Ferrari</button>
                <button onclick="game.setCar('Lamborghini')">Lambo</button>
                <button onclick="game.setCar('BMW')">BMW</button>
                <button onclick="game.setCar('Mercedes')">Mercedes</button>
                <button onclick="game.setCar('McLaren')">McLaren</button>
                <button onclick="game.setCar('Audi')">Audi</button>
                <button onclick="game.setCar('VW')">Volkswagen</button>
            </div>
            <button style="margin-top:20px" onclick="ui.showScreen('main-menu')">BACK</button>
        </div>
    </div>

    <div id="game-over" class="overlay hidden">
        <div class="menu-box">
            <h1 style="color:red">WASTED</h1>
            <button onclick="location.reload()">RETRY</button>
        </div>
    </div>

    <script>
        /* =========================================
           1. GAME CONFIGURATION
           ========================================= */
        const CAR_SPECS = {
            'Ferrari':     { color: 0xff0000, topSpeed: 1.8, acc: 0.008, handle: 0.18, shape: 'sport' },
            'Lamborghini': { color: 0xffff00, topSpeed: 1.9, acc: 0.009, handle: 0.15, shape: 'wedge' },
            'BMW':         { color: 0x0000ff, topSpeed: 1.5, acc: 0.006, handle: 0.20, shape: 'sedan' },
            'Mercedes':    { color: 0xcccccc, topSpeed: 1.6, acc: 0.006, handle: 0.16, shape: 'sedan' },
            'McLaren':     { color: 0xff6600, topSpeed: 1.85, acc: 0.01, handle: 0.19, shape: 'sport' },
            'Audi':        { color: 0xffffff, topSpeed: 1.55, acc: 0.006, handle: 0.17, shape: 'sedan' },
            'VW':          { color: 0x00ff00, topSpeed: 1.2, acc: 0.004, handle: 0.22, shape: 'bug' }
        };

        const STATE = { isRunning: false, speed: 0, distance: 0, health: 100, wanted: 0, brand: 'Ferrari' };
        const INPUT = { up: false, down: false, left: false, right: false };

        /* =========================================
           2. ENGINE SETUP
           ========================================= */
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);
        scene.fog = new THREE.FogExp2(0x87ceeb, 0.01);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(50, 100, 50);
        sun.castShadow = true;
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));

        /* =========================================
           3. OBJECT CLASSES
           ========================================= */
        class CarFactory {
            static create(brand, isPolice = false) {
                const spec = CAR_SPECS[brand];
                const group = new THREE.Group();
                const mat = new THREE.MeshStandardMaterial({ color: isPolice ? 0x111111 : spec.color, roughness: 0.2 });
                
                // Body
                const body = new THREE.Mesh(new THREE.BoxGeometry(2, 0.6, 4), mat);
                body.position.y = 0.6;
                body.castShadow = true;
                group.add(body);

                // Cabin
                const cabin = new THREE.Mesh(new THREE.BoxGeometry(1.5, 0.5, 1.8), new THREE.MeshStandardMaterial({color:0x222222}));
                cabin.position.set(0, 1.1, -0.2);
                group.add(cabin);

                // Wheels
                const wGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.3);
                const wMat = new THREE.MeshStandardMaterial({color:0x111111});
                const wheels = [];
                [[-1,0.4,1.2],[1,0.4,1.2],[-1,0.4,-1.2],[1,0.4,-1.2]].forEach(p => {
                    const w = new THREE.Mesh(wGeo, wMat);
                    w.rotation.z = Math.PI/2;
                    w.position.set(...p);
                    group.add(w);
                    wheels.push(w);
                });

                if(isPolice) {
                    const siren = new THREE.Mesh(new THREE.BoxGeometry(1, 0.2, 0.4), new THREE.MeshBasicMaterial({color:0xff0000}));
                    siren.position.y = 1.4;
                    group.add(siren);
                    group.userData.siren = siren;
                }

                group.userData.wheels = wheels;
                return group;
            }
        }

        const world = {
            decorations: [],
            init() {
                const road = new THREE.Mesh(new THREE.PlaneGeometry(20, 10000), new THREE.MeshStandardMaterial({color:0x333333}));
                road.rotation.x = -Math.PI/2;
                road.receiveShadow = true;
                scene.add(road);
            },
            spawn(z) {
                if(Math.random() > 0.9) {
                    const h = 5 + Math.random()*15;
                    const d = new THREE.Mesh(new THREE.BoxGeometry(2,h,2), new THREE.MeshStandardMaterial({color:0x44aa44}));
                    d.position.set(Math.random()>0.5?8:-8, h/2, z - 400);
                    scene.add(d);
                    this.decorations.push(d);
                }
            }
        };

        const traffic = {
            cars: [],
            spawn(z) {
                if(Math.random() > 0.97 && this.cars.length < 10) {
                    const c = CarFactory.create('BMW', Math.random() > 0.8);
                    c.position.set((Math.random()-0.5)*15, 0, z - 300);
                    c.userData.speed = 0.3 + Math.random()*0.5;
                    scene.add(c);
                    this.cars.push(c);
                }
            },
            update(playerZ) {
                for(let i=this.cars.length-1; i>=0; i--) {
                    const c = this.cars[i];
                    c.position.z -= c.userData.speed;
                    if(c.position.z > playerZ + 50) {
                        scene.remove(c);
                        this.cars.splice(i, 1);
                    }
                    // Collision
                    if(c.position.distanceTo(player.mesh.position) < 3) {
                        game.hit();
                    }
                }
            }
        };

        const player = {
            mesh: null,
            init(brand) {
                if(this.mesh) scene.remove(this.mesh);
                this.mesh = CarFactory.create(brand);
                scene.add(this.mesh);
            },
            update() {
                const spec = CAR_SPECS[STATE.brand];
                if(INPUT.up) STATE.speed += spec.acc;
                else STATE.speed *= 0.98;
                
                if(STATE.speed > spec.topSpeed) STATE.speed = spec.topSpeed;
                
                if(INPUT.left && this.mesh.position.x > -9) this.mesh.position.x -= spec.handle;
                if(INPUT.right && this.mesh.position.x < 9) this.mesh.position.x += spec.handle;

                this.mesh.position.z -= STATE.speed;
                STATE.distance += STATE.speed;

                this.mesh.userData.wheels.forEach(w => w.rotation.x -= STATE.speed);

                camera.position.lerp(new THREE.Vector3(this.mesh.position.x, 4, this.mesh.position.z + 8), 0.1);
                camera.lookAt(this.mesh.position.x, 1, this.mesh.position.z - 5);
            }
        };

        /* =========================================
           4. GAME CONTROL LOGIC
           ========================================= */
        const ui = {
            showScreen(id) {
                document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
                if(id !== 'none') document.getElementById(id).classList.remove('hidden');
            },
            update() {
                document.getElementById('speed-display').innerText = Math.floor(STATE.speed * 180);
                document.getElementById('dist-display').innerText = Math.floor(STATE.distance);
                document.getElementById('health-display').innerText = STATE.health;
            }
        };

        const game = {
            start() {
                STATE.isRunning = true;
                ui.showScreen('none');
                document.getElementById('hud').classList.remove('hidden');
            },
            setCar(brand) {
                STATE.brand = brand;
                player.init(brand);
                ui.showScreen('main-menu');
            },
            hit() {
                STATE.health -= 1;
                STATE.speed *= 0.5;
                document.getElementById('damage-flash').style.opacity = 0.5;
                setTimeout(()=>document.getElementById('damage-flash').style.opacity = 0, 100);
                if(STATE.health <= 0) ui.showScreen('game-over');
            }
        };

        /* =========================================
           5. EVENT LISTENERS & LOOP
           ========================================= */
        window.onkeydown = (e) => {
            if(e.key === 'ArrowUp') INPUT.up = true;
            if(e.key === 'ArrowDown') INPUT.down = true;
            if(e.key === 'ArrowLeft') INPUT.left = true;
            if(e.key === 'ArrowRight') INPUT.right = true;
        };
        window.onkeyup = (e) => {
            if(e.key === 'ArrowUp') INPUT.up = false;
            if(e.key === 'ArrowDown') INPUT.down = false;
            if(e.key === 'ArrowLeft') INPUT.left = false;
            if(e.key === 'ArrowRight') INPUT.right = false;
        };

        function animate() {
            requestAnimationFrame(animate);
            if(STATE.isRunning) {
                player.update();
                world.spawn(player.mesh.position.z);
                traffic.spawn(player.mesh.position.z);
                traffic.update(player.mesh.position.z);
                ui.update();
            }
            renderer.render(scene, camera);
        }

        // Global exposing
        window.ui = ui;
        window.game = game;

        world.init();
        player.init('Ferrari');
        animate();
    </script>
</body>
</html>
