<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pixar-Style Web Game</title>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
        }
        h1 { margin: 0; font-size: 1.5rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <div id="ui">
        <h1>Pixar-Style 3D Scene</h1>
        <p>Built with Three.js (No Images Needed)</p>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. THE SCENE (The World)
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky Blue

        // 2. THE CAMERA (Your Eyes)
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 2, 5);

        // 3. THE RENDERER (The Engine)
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // Enable shadows for that "Pro" look
        document.body.appendChild(renderer.domElement);

        // 4. THE LIGHTING (The "Pixar" Secret)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7); // Soft overall light
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 1.2); // Like the Sun
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        scene.add(mainLight);

        // 5. THE CHARACTER (The "Blob")
        const geometry = new THREE.SphereGeometry(1, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            color: 0xff4444,     // Vibrant Red
            roughness: 0.2,      // Shiny but soft
            metalness: 0.1,
        });
        const character = new THREE.Mesh(geometry, material);
        character.castShadow = true;
        character.position.y = 1;
        scene.add(character);

        // 6. THE GROUND
        const groundGeo = new THREE.PlaneGeometry(20, 20);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x22aa55 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // 7. THE ANIMATION LOOP (The "Squash and Stretch")
        let clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            
            const t = clock.getElapsedTime();
            
            // Bouncing Logic
            character.position.y = Math.abs(Math.sin(t * 3)) * 2 + 1;
            
            // Subtle "Squash" when hitting the ground
            if (character.position.y < 1.2) {
                character.scale.set(1.2, 0.8, 1.2);
            } else {
                character.scale.set(1, 1, 1);
            }

            renderer.render(scene, camera);
        }

        // Handle Window Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
