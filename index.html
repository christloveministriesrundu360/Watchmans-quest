<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixar-Style Racer</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87ceeb; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px; width: 100%;
            text-align: center;
            color: white;
            pointer-events: none;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .speed-meter { font-size: 2rem; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">
        <h1>PIXAR RACER</h1>
        <div class="speed-meter">Press A / D to Steer</div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 1. SETUP ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Bright Sky
        scene.fog = new THREE.Fog(0x87ceeb, 10, 50); // Fog makes it look "endless"

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // --- 2. LIGHTING (The Pixar Glow) ---
        const ambient = new THREE.AmbientLight(0xffffff, 0.8);
        scene.add(ambient);

        const sun = new THREE.DirectionalLight(0xffffff, 1.2);
        sun.position.set(5, 10, 5);
        sun.castShadow = true;
        scene.add(sun);

        // --- 3. THE CAR (Built with "Digital Plastic") ---
        const car = new THREE.Group();

        // Car Body
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0xff0000, roughness: 0.2 });
        const body = new THREE.Mesh(new THREE.BoxGeometry(1, 0.5, 2), bodyMat);
        body.castShadow = true;
        car.add(body);

        // Car Cabin
        const cabin = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.4, 1), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        cabin.position.set(0, 0.45, -0.2);
        car.add(cabin);

        // Wheels
        const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2, 32);
        const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
        const wheels = [];

        const wheelPositions = [
            [-0.6, -0.2, 0.6], [0.6, -0.2, 0.6], 
            [-0.6, -0.2, -0.6], [0.6, -0.2, -0.6]
        ];

        wheelPositions.forEach(pos => {
            const wheel = new THREE.Mesh(wheelGeo, wheelMat);
            wheel.rotation.z = Math.PI / 2;
            wheel.position.set(...pos);
            car.add(wheel);
            wheels.push(wheel);
        });

        car.position.y = 0.5;
        scene.add(car);

        // --- 4. THE ROAD ---
        const roadGroup = new THREE.Group();
        const roadGeo = new THREE.PlaneGeometry(10, 100);
        const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444 });
        const road = new THREE.Mesh(roadGeo, roadMat);
        road.rotation.x = -Math.PI / 2;
        road.receiveShadow = true;
        roadGroup.add(road);

        // Grass
        const grassGeo = new THREE.PlaneGeometry(100, 100);
        const grassMat = new THREE.MeshStandardMaterial({ color: 0x55aa44 });
        const grass = new THREE.Mesh(grassGeo, grassMat);
        grass.rotation.x = -Math.PI / 2;
        grass.position.y = -0.1;
        roadGroup.add(grass);

        scene.add(roadGroup);

        // --- 5. CONTROLS & LOGIC ---
        const keys = { a: false, d: false };
        window.onkeydown = (e) => keys[e.key.toLowerCase()] = true;
        window.onkeyup = (e) => keys[e.key.toLowerCase()] = false;

        let speed = 0.4;
        let carX = 0;

        function animate() {
            requestAnimationFrame(animate);

            // Move road to simulate speed
            road.position.z += speed;
            if (road.position.z > 20) road.position.z = 0;

            // Steering
            if (keys.a && carX > -4) {
                carX -= 0.1;
                car.rotation.z = 0.1; // Lean into turn
            } else if (keys.d && carX < 4) {
                carX += 0.1;
                car.rotation.z = -0.1;
            } else {
                car.rotation.z = 0; // Straighten up
            }
            car.position.x = carX;

            // Rotate wheels
            wheels.forEach(w => w.rotation.x += 0.2);

            // Bouncy "Pixar" Suspension
            car.position.y = 0.5 + Math.sin(Date.now() * 0.01) * 0.02;

            // Camera follow
            camera.position.set(carX * 0.5, 3, 6);
            camera.lookAt(carX, 0, -2);

            renderer.render(scene, camera);
        }

        animate();

        // Resize Fix
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
