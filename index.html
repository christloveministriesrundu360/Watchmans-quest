<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Watchman’s Quest Ludo</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ece9e6, #ffffff);
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0; padding: 20px;
  }
  h1 {
    margin-bottom: 10px;
    color: #333;
    text-shadow: 1px 1px 2px #aaa;
  }
  #board {
    display: grid;
    grid-template-columns: repeat(15, 40px);
    grid-template-rows: repeat(15, 40px);
    gap: 2px;
    margin-bottom: 20px;
    border: 5px solid #555;
    background: #f2f2f2;
  }
  .cell {
    width: 40px; height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    border-radius: 5px;
    transition: background 0.3s;
  }
  .red { background: #ff6666; }
  .blue { background: #66ccff; }
  .green { background: #66ff66; }
  .yellow { background: #ffeb66; }
  .path { background: #eee; }
  .safe { border: 2px solid #555; }
  .token {
    width: 30px; height: 30px;
    border-radius: 50%;
    box-shadow: 1px 1px 5px rgba(0,0,0,0.5);
    transition: transform 0.3s;
  }
  .red-token { background: red; }
  .blue-token { background: blue; }
  .green-token { background: green; }
  .yellow-token { background: yellow; }

  #diceBtn { padding: 12px 25px; font-size: 18px; cursor: pointer; border-radius: 5px; margin-bottom: 10px; }
  #diceResult { font-size: 22px; margin-bottom: 10px; }
  #turnInfo { font-size: 20px; margin-bottom: 20px; }
</style>
</head>
<body>

<h1>The Watchman’s Quest: Ludo</h1>
<div id="board"></div>
<button id="diceBtn">Roll Dice</button>
<div id="diceResult">Dice: -</div>
<div id="turnInfo">Red's Turn</div>

<script>
// --- Board Setup ---
const board = document.getElementById('board');
const diceBtn = document.getElementById('diceBtn');
const diceResult = document.getElementById('diceResult');
const turnInfo = document.getElementById('turnInfo');

const cells = [];
for(let i=0;i<225;i++){
    const div = document.createElement('div');
    div.classList.add('cell', 'path');
    board.appendChild(div);
    cells.push(div);
}

// --- Define home corners ---
const homes = {
  red: [0,1,15,16],
  blue: [14,15,29,30],
  green: [210,211,225,226],
  yellow: [224,223,209,208]
};

// --- Tokens ---
const tokens = {
  red: [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
  blue: [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
  green: [{pos:-1},{pos:-1},{pos:-1},{pos:-1}],
  yellow: [{pos:-1},{pos:-1},{pos:-1},{pos:-1}]
};

// --- Simple path array (demo) ---
const path = [];
for(let i=0;i<15;i++) path.push(i); // top row
for(let i=16;i<225;i+=15) path.push(i); // right column
for(let i=223;i>208;i--) path.push(i); // bottom row
for(let i=207;i>15;i-=15) path.push(i); // left column

let currentPlayer = 'red';
let selectedToken = 0;

// Draw tokens
function drawTokens(){
    cells.forEach(c=>c.innerHTML=''); // clear
    ['red','blue','green','yellow'].forEach(color=>{
        tokens[color].forEach(t=>{
            if(t.pos>=0) {
                const tokenDiv = document.createElement('div');
                tokenDiv.classList.add('token', `${color}-token`);
                cells[path[t.pos]].appendChild(tokenDiv);
            }
        });
    });
}

diceBtn.onclick = ()=>{
    const roll = Math.floor(Math.random()*6)+1;
    diceResult.textContent = `Dice: ${roll}`;

    // Pick first available token
    let token = tokens[currentPlayer][selectedToken];

    if(token.pos===-1 && roll===6){
        token.pos=0; // leave home
    } else if(token.pos>=0){
        token.pos += roll;
        if(token.pos>=path.length) token.pos = path.length-1;
    }

    drawTokens();

    // Next turn
    const next = {red:'blue',blue:'green',green:'yellow',yellow:'red'};
    currentPlayer = next[currentPlayer];
    turnInfo.textContent = currentPlayer.charAt(0).toUpperCase() + currentPlayer.slice(1) + "'s Turn";
}

drawTokens();
</script>
</body>
</html>
