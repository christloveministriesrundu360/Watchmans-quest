<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Ludo Board</title>
    <style>
        :root {
            --red: #e74c3c;
            --blue: #3498db;
            --yellow: #f1c40f;
            --green: #2ecc71;
            --white: #ffffff;
            --border: #333;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }

        /* The Board Container */
        .ludo-board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: 90vw;
            height: 90vw;
            max-width: 600px;
            max-height: 600px;
            background-color: var(--white);
            border: 5px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* Common Cell Styles */
        .cell {
            border: 1px solid #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* The Four Colored Bases (Yards) */
        .base {
            grid-column: span 6;
            grid-row: span 6;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .base-inner {
            background: white;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 10px;
            padding: 15px;
        }

        .token-slot {
            background: #eee;
            border-radius: 50%;
            border: 2px dashed #999;
        }

        /* Coloring the Sections */
        .red { background-color: var(--red); }
        .green { background-color: var(--green); }
        .yellow { background-color: var(--yellow); }
        .blue { background-color: var(--blue); }

        /* The Center Home Area */
        .home {
            grid-column: span 3;
            grid-row: span 3;
            position: relative;
            background: white;
            border: 1px solid var(--border);
        }

        /* Creating the Triangles in the Center */
        .home::before {
            content: "";
            position: absolute;
            width: 0; height: 0;
            border-style: solid;
            border-width: 60px 60px 60px 60px; /* Responsive borders */
            border-color: var(--red) var(--green) var(--yellow) var(--blue);
            top: 0; left: 0;
            width: 100%; height: 100%;
            box-sizing: border-box;
        }

        /* Specific Path Styling */
        .safe-spot { background-color: #ddd !important; }
        .safe-spot::after { content: "★"; color: #777; font-size: 1.2rem; }

        /* UI Controls */
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .dice {
            width: 60px;
            height: 60px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            cursor: pointer;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background: #333;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div class="ludo-board">
        <div class="base red" style="grid-area: 1 / 1 / 7 / 7;">
            <div class="base-inner">
                <div class="token-slot"></div><div class="token-slot"></div>
                <div class="token-slot"></div><div class="token-slot"></div>
            </div>
        </div>

        <div class="base green" style="grid-area: 1 / 10 / 7 / 16;">
            <div class="base-inner">
                <div class="token-slot"></div><div class="token-slot"></div>
                <div class="token-slot"></div><div class="token-slot"></div>
            </div>
        </div>

        <div class="base blue" style="grid-area: 10 / 1 / 16 / 7;">
            <div class="base-inner">
                <div class="token-slot"></div><div class="token-slot"></div>
                <div class="token-slot"></div><div class="token-slot"></div>
            </div>
        </div>

        <div class="base yellow" style="grid-area: 10 / 10 / 16 / 16;">
            <div class="base-inner">
                <div class="token-slot"></div><div class="token-slot"></div>
                <div class="token-slot"></div><div class="token-slot"></div>
            </div>
        </div>

        <div class="home" style="grid-area: 7 / 7 / 10 / 10;"></div>

        <div class="cell green" style="grid-area: 2 / 8 / 7 / 9;"></div>
        <div class="cell blue" style="grid-area: 10 / 8 / 15 / 9;"></div>
        <div class="cell red" style="grid-area: 8 / 2 / 9 / 7;"></div>
        <div class="cell yellow" style="grid-area: 8 / 10 / 9 / 15;"></div>

        <div class="cell safe-spot" style="grid-area: 3 / 7;"></div>
        <div class="cell safe-spot" style="grid-area: 7 / 13;"></div>
        <div class="cell safe-spot" style="grid-area: 13 / 9;"></div>
        <div class="cell safe-spot" style="grid-area: 9 / 3;"></div>
    </div>

    <div class="controls">
        <div class="dice" id="dice">?</div>
        <button onclick="rollDice()">Roll Dice</button>
    </div>

    <script>
        function rollDice() {
            const dice = document.getElementById('dice');
            dice.style.transform = "rotate(360deg)";
            dice.style.transition = "0.2s";
            
            setTimeout(() => {
                const result = Math.floor(Math.random() * 6) + 1;
                dice.innerText = result;
                dice.style.transform = "rotate(0deg)";
            }, 200);
        }
    </script>
</body>
</html>
