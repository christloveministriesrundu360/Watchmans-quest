<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>The Watchman's Quest</title>

<style>

body{
margin:0;
background:#0b0f1a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin-top:10px;
}

canvas{
background:#111;
border:3px solid #3fa9ff;
margin-top:10px;
}

</style>

</head>

<body>

<h1>The Watchman's Quest</h1>
<p>Collect the Light Orbs. Avoid the Darkness.</p>

<canvas id="game" width="600" height="400"></canvas>

<script>

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let player = {
x:50,
y:200,
size:20,
speed:4
};

let orb = {
x:500,
y:200,
size:10
};

let score = 0;

let keys = {};

document.addEventListener("keydown",(e)=>{
keys[e.key]=true;
});

document.addEventListener("keyup",(e)=>{
keys[e.key]=false;
});

function movePlayer(){

if(keys["ArrowUp"]) player.y -= player.speed;
if(keys["ArrowDown"]) player.y += player.speed;
if(keys["ArrowLeft"]) player.x -= player.speed;
if(keys["ArrowRight"]) player.x += player.speed;

}

function collision(){

let dx = player.x - orb.x;
let dy = player.y - orb.y;
let distance = Math.sqrt(dx*dx + dy*dy);

if(distance < player.size + orb.size){

score++;

orb.x = Math.random()*560+20;
orb.y = Math.random()*360+20;

}

}

function draw(){

ctx.clearRect(0,0,600,400);

ctx.fillStyle="gold";
ctx.beginPath();
ctx.arc(orb.x,orb.y,orb.size,0,Math.PI*2);
ctx.fill();

ctx.fillStyle="cyan";
ctx.fillRect(player.x,player.y,player.size,player.size);

ctx.fillStyle="white";
ctx.font="20px Arial";
ctx.fillText("Score: "+score,10,25);

}

function gameLoop(){

movePlayer();
collision();
draw();

requestAnimationFrame(gameLoop);

}

gameLoop();

</script>

</body>
</html>
