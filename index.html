<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixar Pro Racer: World Tour</title>
    <style>
        :root { --primary: #ff4757; --dark: #2f3542; --light: #ffffff; }
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #000; }
        
        /* UI OVERLAYS */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.8); color: white; transition: 0.3s; z-index: 10;
        }
        .hidden { display: none !important; }
        
        .menu-card {
            background: var(--dark); padding: 40px; border-radius: 20px;
            text-align: center; border: 4px solid var(--primary); width: 400px;
        }
        
        button {
            background: var(--primary); border: none; padding: 15px 30px;
            color: white; font-size: 1.2rem; font-weight: bold; border-radius: 10px;
            cursor: pointer; margin: 10px; width: 80%; transition: 0.2s;
        }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        
        /* CAR SELECTION UI */
        .car-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .car-btn { font-size: 0.9rem; padding: 10px; }

        #hud {
            position: absolute; top: 20px; left: 20px; color: white;
            pointer-events: none; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="hud" class="hidden">
        <h2 id="current-zone">VALLEY</h2>
        <p>Speed: <span id="speed-val">0</span> km/h</p>
        <p>Distance: <span id="dist-val">0</span>m</p>
    </div>

    <div id="main-menu" class="overlay">
        <div class="menu-card">
            <h1>PIXAR RACER PRO</h1>
            <button onclick="startGame()">START RACE</button>
            <button onclick="showScreen('car-select')">GARAGE</button>
            <button onclick="showScreen('settings')">SETTINGS</button>
        </div>
    </div>

    <div id="car-select" class="overlay hidden">
        <div class="menu-card">
            <h2>SELECT YOUR SUPERCAR</h2>
            <div class="car-grid">
                <button class="car-btn" onclick="selectCar('Ferrari')">Ferrari (Red)</button>
                <button class="car-btn" onclick="selectCar('Lamborghini')">Lambo (Yellow)</button>
                <button class="car-btn" onclick="selectCar('BMW')">BMW (Blue)</button>
                <button class="car-btn" onclick="selectCar('Mercedes')">Mercedes (Silver)</button>
                <button class="car-btn" onclick="selectCar('McLaren')">McLaren (Orange)</button>
                <button class="car-btn" onclick="selectCar('Audi')">Audi (White)</button>
                <button class="car-btn" onclick="selectCar('VW')">VW Bug (Green)</button>
            </div>
            <button style="background:#555" onclick="showScreen('main-menu')">BACK</button>
        </div>
    </div>

    <div id="pause-menu" class="overlay hidden">
        <div class="menu-card">
            <h1>PAUSED</h1>
            <button onclick="togglePause()">CONTINUE</button>
            <button onclick="location.reload()">RESTART</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- GAME STATE ---
        const state = {
            running: false,
            paused: false,
            speed: 0,
            distance: 0,
            selectedCar: 'Ferrari',
            zone: 'Valley'
        };

        const carData = {
            'Ferrari': { color: 0xff0000, speed: 0.6, shape: 'low' },
            'Lamborghini': { color: 0xffff00, speed: 0.7, shape: 'wedge' },
            'BMW': { color: 0x0000ff, speed: 0.5, shape: 'sedan' },
            'Mercedes': { color: 0xcccccc, speed: 0.55, shape: 'sedan' },
            'McLaren': { color: 0xff6600, speed: 0.65, shape: 'low' },
            'Audi': { color: 0xffffff, speed: 0.5, shape: 'sedan' },
            'VW': { color: 0x22aa55, speed: 0.4, shape: 'bug' }
        };

        // --- THREE.JS SCENE SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const sun = new THREE.DirectionalLight(0xffffff, 1.5);
        sun.position.set(10, 20, 10);
        sun.castShadow = true;
        scene.add(sun, new THREE.AmbientLight(0xffffff, 0.5));
        scene.fog = new THREE.Fog(0x87ceeb, 10, 100);

        // --- CAR FACTORY ---
        let playerCar;
        function buildCar(brand) {
            if(playerCar) scene.remove(playerCar);
            const data = carData[brand];
            const group = new THREE.Group();
            
            // Body based on style
            let bodyGeo;
            if(data.shape === 'wedge') bodyGeo = new THREE.BoxGeometry(1.1, 0.3, 2.2);
            else if(data.shape === 'low') bodyGeo = new THREE.BoxGeometry(1, 0.4, 2);
            else bodyGeo = new THREE.BoxGeometry(1, 0.6, 1.8);

            const body = new THREE.Mesh(bodyGeo, new THREE.MeshStandardMaterial({ color: data.color, roughness: 0.1 }));
            body.position.y = 0.4;
            body.castShadow = true;
            group.add(body);

            // Add wheels
            const wheelGeo = new THREE.CylinderGeometry(0.3, 0.3, 0.2);
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
            [[-0.6,0.3,0.7],[0.6,0.3,0.7],[-0.6,0.3,-0.7],[0.6,0.3,-0.7]].forEach(pos => {
                const w = new THREE.Mesh(wheelGeo, wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(...pos);
                group.add(w);
            });

            scene.add(group);
            playerCar = group;
        }

        // --- WORLD GENERATION ---
        const trackGroup = new THREE.Group();
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 5000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
        ground.rotation.x = -Math.PI/2;
        ground.position.z = -2500;
        ground.receiveShadow = true;
        scene.add(ground);

        // Add 200 random obstacles (Trees, Buildings)
        for(let i=0; i<200; i++) {
            const h = Math.random()*10 + 2;
            const obj = new THREE.Mesh(new THREE.BoxGeometry(2,h,2), new THREE.MeshStandardMaterial({ color: 0x44aa44 }));
            obj.position.set(Math.random()>0.5?7:-7, h/2, -Math.random()*4000);
            scene.add(obj);
        }

        // --- CONTROLS ---
        const keys = {};
        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Escape') togglePause();
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- CORE LOOP ---
        function update() {
            if(!state.running || state.paused) return;

            // Physics
            if(keys['ArrowUp']) state.speed += 0.005;
            else state.speed *= 0.98; // Drag

            if(keys['ArrowLeft'] && playerCar.position.x > -4) playerCar.position.x -= 0.1;
            if(keys['ArrowRight'] && playerCar.position.x < 4) playerCar.position.x += 0.1;

            state.distance += state.speed;
            playerCar.position.z -= state.speed;

            // Camera
            camera.position.lerp(new THREE.Vector3(playerCar.position.x, 3, playerCar.position.z + 6), 0.1);
            camera.lookAt(playerCar.position.x, 1, playerCar.position.z - 5);

            // UI
            document.getElementById('speed-val').innerText = Math.floor(state.speed * 400);
            document.getElementById('dist-val').innerText = Math.floor(state.distance);

            // Zone Logic
            if(state.distance > 1000) changeZone('Canyon', 0xffaa66);
            if(state.distance > 2500) changeZone('Night City', 0x111122);
        }

        function changeZone(name, color) {
            state.zone = name;
            document.getElementById('current-zone').innerText = name;
            scene.fog.color.set(color);
            renderer.setClearColor(color);
        }

        function animate() {
            requestAnimationFrame(animate);
            update();
            renderer.render(scene, camera);
        }

        // --- UI FUNCTIONS (Global) ---
        window.showScreen = (id) => {
            document.querySelectorAll('.overlay').forEach(el => el.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        };

        window.selectCar = (brand) => {
            state.selectedCar = brand;
            buildCar(brand);
            showScreen('main-menu');
        };

        window.startGame = () => {
            state.running = true;
            document.getElementById('hud').classList.remove('hidden');
            showScreen('none');
        };

        window.togglePause = () => {
            if(!state.running) return;
            state.paused = !state.paused;
            showScreen(state.paused ? 'pause-menu' : 'none');
        };

        buildCar('Ferrari');
        animate();
    </script>
</body>
</html>
